services:
    # 1. Postgres Database
    db:
        image: postgres:15-alpine
        hostname: db
        volumes:
            - ./postgres_data:/var/lib/postgresql/data
        env_file: .env
        networks:
            - dev_network
        ports:
            - "5432:5432"

    # 2. Redis: Standard alpine image for caching/tasks
    redis:
        image: redis:7-alpine
        hostname: redis
        env_file: .env
        command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
        ports:
            - "6379:6379" # Exposed so you can inspect it with Redis Insight or CLI
        networks:
            - dev_network

    # 3. Django: Your application
    web:
        build:
            context: .
            dockerfile: ./docker/Dockerfile
        command: /usr/local/bin/run.sh
        container_name: django_web_dev
        volumes:
            - .:/code
            # Prevent Docker from overwriting the container's node_modules with your host's
            # (if they differ by OS)
            - /code/.venv # <--- ADD THIS: Internal container venv
            - /code/node_modules
        ports:
            - "8000:8000"
        env_file:
            - .env
        environment:
            - DEBUG=1
        depends_on:
            - redis
            - db
        networks:
            - dev_network
    worker:
        build:
            context: .
            dockerfile: ./docker/Dockerfile
        command: sh -c "cd src && celery -A settings worker --loglevel=info"
        volumes:
            - .:/code
        depends_on:
            - db
            - redis
        networks:
            - dev_network

    beat:
        build:
            context: .
            dockerfile: ./docker/Dockerfile
        command: sh -c "cd src && celery -A settings beat --loglevel=info"
        volumes:
            - .:/code
        depends_on:
            - db
            - redis
        networks:
            - dev_network

    # 2. Ollama: The AI engine
    # ollama:
    #     image: ollama/ollama:latest
