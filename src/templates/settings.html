{% extends "base.html" %}

{% block title %}
	Settings
{% endblock %}

{% block content %}
	<section class="lg:px-60">
		<div class="h-60 flex flex-col justify-between mb-10">
			<h3 class="text-2xl">Tags</h3>
			<div class="max-w-125">
				<div
					id="tagList"
					class="tag-display-area flex flex-wrap gap-2 mb-3.75 min-h-10"
				>
					{% for tag in tags %}
						<div
							class="badge-neo"
							style="background-color: #{{ tag.colour }}"
						>
							{{ tag.name }}
						</div>
					{% endfor %}
					{% for tag in user_tags %}
						<div
							class="badge-neo"
							style="background-color: #{{ tag.colour }}"
						>
							{{ tag.name }}
						</div>
					{% endfor %}
				</div>

				<div class="tag-controls">
					<div class="brutal-color-picker">
						<input type="color" id="tagColor" value="#ffff00" />
					</div>

					<input
						type="text"
						id="tagInput"
						class="brutal-input"
						placeholder="Type a tag and press Enter..."
					/>
				</div>
			</div>

			<form action="{% url 'settings' %}" method="POST">
				{% csrf_token %}
				<input
					type="hidden"
					name="final_tags"
					id="hiddenTagsInput"
					value="{{ request.POST.final_tags }}"
				/>
				<button class="btn-neo">Save</button>
			</form>

			<script>
				// 1. SELECTORS
				const tagList = document.getElementById("tagList");
				const tagInput = document.getElementById("tagInput");
				const tagColor = document.getElementById("tagColor");
				const colorWrapper = document.querySelector(
					".brutal-color-picker",
				);
				const hiddenTagsInput =
					document.getElementById("hiddenTagsInput");

				// State management: array of { label: "NAME", color: "#HEX" }
				let tagsData = [];

				// The Single Source of Truth for your Form
				function updateStateAndUI() {
					// 1. Sync the hidden input for Django
					const encoded = tagsData
						.map((t) => `${t.label}|${t.color}`)
						.join(",");
					hiddenTagsInput.value = encoded;

					// Console log this during development to see it working in real-time!
					console.log(
						"Hidden Input updated to:",
						hiddenTagsInput.value,
					);

					// 2. Clear and Redraw the List (to keep UI and Data perfectly synced)
					// Note: Only do this if you want to be 100% sure,
					// otherwise just call syncToHiddenInput() inside your add/remove functions.
				}

				// UPDATED ENTER KEY LISTENER
				tagInput.addEventListener("keydown", (e) => {
					if (e.key === "Enter") {
						e.preventDefault();

						const label = tagInput.value.trim();
						const color = tagColor.value;

						if (label && !tagsData.some((t) => t.label === label)) {
							// Add to Data
							tagsData.push({ label, color });

							// Add to UI
							renderTag(label, color);

							// SYNC
							hiddenTagsInput.value = tagsData
								.map((t) => `${t.label}|${t.color}`)
								.join(",");

							tagInput.value = "";
						}
					}
				});

				function renderTag(label, color) {
					const div = document.createElement("div");
					div.className = "badge-neo";
					div.style.backgroundColor = color;
					div.innerHTML = `<span>${label}</span><span class="remove-btn">×</span>`;

					div.querySelector(".remove-btn").onclick = () => {
						// Remove from Data
						tagsData = tagsData.filter((t) => t.label !== label);
						// Remove from UI
						div.remove();
						// SYNC AGAIN
						hiddenTagsInput.value = tagsData
							.map((t) => `${t.label}|${t.color}`)
							.join(",");
					};

					tagList.appendChild(div);
				}

				// 6. INITIALIZATION (RE-HYDRATION)
				// If Django sends back existing tags (e.g., after a form error),
				// this handles rendering them on page load.
				window.addEventListener("DOMContentLoaded", () => {
					const existingData = hiddenTagsInput.value;
					if (existingData) {
						const pairs = existingData.split(",");
						pairs.forEach((pair) => {
							const [label, color] = pair.split("|");
							if (label && color) {
								tagsData.push({ label, color });
								addTagElement(label, color);
							}
						});
					}
				});
			</script>
		</div>

		<div>
			<h3 class="text-2xl">Connect To Email</h3>
			<a href="{% url 'connect-google' %}" class="btn-neo"
				>Connect to Gmail</a
			>
		</div>
	</section>
{% endblock %}
